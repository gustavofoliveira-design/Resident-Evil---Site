  </head>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body data-page="jogos">

<header class="header navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="home.html">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

<!-- ===================== -->
<!-- Cards de Jogos        -->
<!-- ===================== -->
<main class="section">
  <h5>JOGOS</h5>

  <div class="container">
    <div class="row g-3">

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(0)">
          <img src="img/jogos/RE1R_card.jpg" class="jogo-card-img">
          <p>Resident Evil 1</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(1)">
          <img src="img/jogos/RE2R_card.jpg" class="jogo-card-img">
          <p>Resident Evil 2</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(2)">
          <img src="img/jogos/RE3R_card.jpg" class="jogo-card-img">
          <p>Resident Evil 3</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(3)">
          <img src="img/jogos/RE4R_card.jpg" class="jogo-card-img">
          <p>Resident Evil 4</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(4)">
          <img src="img/jogos/RE5_card.jpg" class="jogo-card-img">
          <p>Resident Evil 5</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(5)">
          <img src="img/jogos/RE6_card.jpg" class="jogo-card-img">
          <p>Resident Evil 6</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(6)">
          <img src="img/jogos/RE7_card.jpg" class="jogo-card-img">
          <p>Resident Evil 7: Biohazard</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(7)">
          <img src="img/jogos/RE8_card.jpg" class="jogo-card-img">
          <p>Resident Evil Village</p>
        </div>
      </div>

      <div class="col-6 col-md-4 col-lg-2">
        <div class="jogo-card" onclick="abrirModal(8)">
          <img src="img/jogos/RE9_card.jpg" class="jogo-card-img">
          <p>Resident Evil Requiem</p>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- ===================== -->
<!-- Modal de Detalhes     -->
<!-- ===================== -->
<div class="modal" id="modal">

  <div class="modal-content">

    <span class="fechar" onclick="fecharModal()">×</span>

    <button class="seta esquerda" onclick="mudarJogo(-1)">
      <
      <img id="prev-thumb">
    </button>

    <button class="seta direita" onclick="mudarJogo(1)">
      <img id="next-thumb">
      ❯      
    </button>

    <div class="modal-body">

      <div class="img-bloco">

        <div class="img-container">
          <img id="modal-j-img">
        </div>
      </div>

      <div class="modal-info">
        <h2 id="nome"></h2>
        <h3 id="subtitulo"></h3>
        <p id="descricao"></p>
      </div>

    </div>

  </div>

</div>

<script src="./script.js"></script>

</body>
</html>
