<main class="section">
  <h5>PERSONAGENS</h5>

  <div class="grid-personagens">

      <p>CHRIS</p>
    </div>

    </div>

    <div class="personagem-card" onclick="abrirModal(3)">

    </div>

  </div>
</main>

<!-- ===================== -->
<!-- MODAL                 -->
<!-- ===================== -->
<div class="modal" id="modal">

  <div class="modal-content">

    <span class="fechar" onclick="fecharModal()">×</span>

    <button class="seta esquerda" onclick="mudarPersonagem(-1)">
      <
      <img id="prev-thumb">
    </button>

    <button class="seta direita" onclick="mudarPersonagem(1)">
      <img id="next-thumb">
      ❯      
    </button>

    <div class="modal-body">

      <div class="img-bloco">
        
        <div class="img-container">
          <img id="modal-p-img">
        </div>

        <div class="versao">
          <button class="sversao esquerda" onclick="trocarVersao(-1)">❮</button>
          <p id="legenda"></p>
          <button class="sversao direita" onclick="trocarVersao(1)">❯</button>
        </div>
 
      </div>

      <div class="modal-info">
        <h2 id="nome"></h2>
        <h3 id="subtitulo"></h3>
        <p id="descricao"></p>
      </div>

    </div>

  </div>

</div>
